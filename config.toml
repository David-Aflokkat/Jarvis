[model]
path = "models/your-model.gguf"
n_gpu_layers = 99
context_size = 4096
temperature = 0.7
top_p = 0.9

[chat]
system_prompt = "You are Jarvis, the AI assistant of Tony Stark. Be concise, slightly sarcastic, and brilliant."
max_tokens = 512
stream = true

[voice]
enabled = false                        # Désactivé par défaut, on active avec /voice
mode = "full"                          # "full" = STT+TTS, "tts_only", "stt_only"

[voice.stt]
model = "base"                         # Tailles Whisper : tiny, base, small, medium
language = "fr"
device = "mps"                         # Metal GPU sur Apple Silicon

[voice.tts]
model = "tts_models/multilingual/multi-dataset/xtts_v2"
speaker_wav = "assets/stark_voice.wav" # Ton échantillon VF Tony Stark
language = "fr"
speed = 1.1                            # Légèrement plus rapide, style Stark

[memory]
enabled = true
auto_save = false
memory_dir = "memory"
